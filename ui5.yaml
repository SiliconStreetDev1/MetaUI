specVersion: "3.0"
metadata:
  name: nz.co.siliconst.ui5.metaui
type: library
builder:
  resources:
    excludes:
      - "/test/**"
      - "/test-resources/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        removeSourceFiles: true
        excludePatterns:
          - "test/**"
          - "test-resources/**"
        transformModulesToUI5:
          overridesToOverride: true
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        debug: true
        excludePatterns:
          - "test/**"
          - "test-resources/**"
        transformModulesToUI5:
          overridesToOverride: true
