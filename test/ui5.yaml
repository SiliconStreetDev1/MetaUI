specVersion: "3.0"
metadata:
  name: metaui-sandbox
type: application
server:
  customMiddleware:
    - name: ui5-middleware-servestatic
      afterMiddleware: compression
      mountPath: /resources
      configuration:
        debug: true
        rootPath: ../dist/resources
    - name: "sap-fe-mockserver"
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /odata/v4/main
            metadataPath: ./mockserver/metadata.xml
            mockdataPath: ./mockserver/data
            generateMockData: true
        annotations: []
